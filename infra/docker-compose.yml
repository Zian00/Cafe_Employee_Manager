services:
  backend:
    image: cafe-employee-manager-backend
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    develop:
      watch:
        - action: sync
          path: ../backend/app
          target: /app/app
        - action: rebuild
          path: ../backend/requirements.txt

  frontend:
    image: cafe-employee-manager-frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:80"
    depends_on:
      - backend
    develop:
      watch:
        - action: rebuild
          path: ../frontend/src
        - action: rebuild
          path: ../frontend/package.json
